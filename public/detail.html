<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Logs</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --panel: #ffffff;
        --text: #1c2330;
        --muted: #667085;
        --accent: #2358a6;
        --success: #117a4b;
        --danger: #b42318;
        --line: #d9e1ee;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top right, rgba(35, 88, 166, 0.14), transparent 28%),
          linear-gradient(180deg, #fbfcfe 0%, var(--bg) 100%);
        color: var(--text);
        min-height: 100vh;
      }

      .wrap {
        max-width: 1120px;
        margin: 0 auto;
        padding: 40px 20px 64px;
      }

      .top {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 16px;
        align-items: end;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 4vw, 44px);
        line-height: 1.05;
      }

      .meta {
        color: var(--muted);
      }

      .back {
        color: var(--accent);
        text-decoration: none;
        font-weight: 700;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 18px 44px rgba(28, 35, 48, 0.06);
      }

      .table {
        width: 100%;
        border-collapse: collapse;
      }

      .table thead th {
        text-align: left;
        padding: 16px 18px;
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        border-bottom: 1px solid var(--line);
      }

      .table tbody td {
        padding: 16px 18px;
        border-bottom: 1px solid rgba(217, 225, 238, 0.8);
        vertical-align: top;
      }

      .status {
        display: inline-flex;
        align-items: center;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
      }

      .status.running {
        background: rgba(35, 88, 166, 0.1);
        color: var(--accent);
      }

      .status.success {
        background: rgba(17, 122, 75, 0.1);
        color: var(--success);
      }

      .status.failed {
        background: rgba(180, 35, 24, 0.1);
        color: var(--danger);
      }

      .empty {
        padding: 20px 18px 26px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="top">
        <div>
          <a class="back" href="/index.html">&larr; Quay lai danh sach</a>
          <h1 id="title">Task Logs</h1>
          <div class="meta" id="subtitle">Dang tai du lieu...</div>
        </div>
      </div>

      <section class="card">
        <table class="table">
          <thead>
            <tr>
              <th>Time</th>
              <th>Status</th>
              <th>Duration</th>
              <th>Message</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr>
              <td colspan="4" class="empty">Dang tai log...</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>

    <script>
      const params = new URLSearchParams(location.search);
      const id = params.get('id');
      const titleElement = document.getElementById('title');
      const subtitleElement = document.getElementById('subtitle');
      const tableBody = document.getElementById('table-body');

      if (!id) {
        subtitleElement.textContent = 'Thieu id task.';
        tableBody.innerHTML = '<tr><td colspan="4" class="empty">Khong tim thay task.</td></tr>';
      } else {
        fetch('/scheduler/' + id + '/logs')
          .then((response) => response.json())
          .then((logs) => {
            titleElement.textContent = 'Task #' + id;
            subtitleElement.textContent = 'So luong log: ' + (Array.isArray(logs) ? logs.length : 0);

            if (!Array.isArray(logs) || logs.length === 0) {
              tableBody.innerHTML = '<tr><td colspan="4" class="empty">Chua co log nao.</td></tr>';
              return;
            }

            tableBody.innerHTML = logs
              .map((log) => {
                const statusClass = String(log.status || '').toLowerCase();
                const startedAt = log.startedAt ? new Date(log.startedAt).toLocaleString() : '-';
                const duration = typeof log.durationMs === 'number' ? log.durationMs + ' ms' : '-';
                const message = log.message || '-';

                return `
                  <tr>
                    <td>${startedAt}</td>
                    <td><span class="status ${statusClass}">${log.status}</span></td>
                    <td>${duration}</td>
                    <td>${message}</td>
                  </tr>
                `;
              })
              .join('');
          })
          .catch(() => {
            subtitleElement.textContent = 'Khong the tai log.';
            tableBody.innerHTML = '<tr><td colspan="4" class="empty">Khong the tai log cua task nay.</td></tr>';
          });
      }
    </script>
  </body>
</html>
